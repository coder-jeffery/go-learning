# 前端静态站点
upstream frontend {
    server 127.0.0.1:80;
}

# 用户服务
upstream user_service {
    server 192.168.0.10:8080;
    server 192.168.0.11:8080;
    keepalive 32;
}

# 订单服务
upstream order_service {
    server 192.168.0.10:8081;
    server 192.168.0.11:8081;
    keepalive 32;
}

# 支付服务
upstream pay_service {
    server 192.168.0.10:8082;
    keepalive 32;
}

# HTTPS 网关入口
server {
    listen 80;
    server_name api.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.yourdomain.com;

    # SSL 证书（生产必须配置）
    ssl_certificate /etc/nginx/cert/yourdomain.crt;
    ssl_certificate_key /etc/nginx/cert/yourdomain.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 全局限流
    limit_req zone=apiLimit burst=20 nodelay;

    # 前端页面
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
        expires 2h;
    }

    # 用户服务
    location /api/user/ {
        proxy_pass http://user_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # 订单服务
    location /api/order/ {
        proxy_pass http://order_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 支付服务
    location /api/pay/ {
        proxy_pass http://pay_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|css|js|ico|woff2)$ {
        root /usr/share/nginx/html;
        expires 7d;
        access_log off;
    }
}